<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>404 - SANSUIZ</title>
  <link rel="icon" href="/images/fav.png" type="image/x-icon">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/mouse.css">
  <style>
    .error-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      text-align: left;
      padding: 2rem;
      padding-left: 12rem;
    }
    
    .error-wrapper {
      position: relative;
      max-width: 520px;
    }
    
    .error-code {
      font-size: 10rem;
      font-weight: bold;
      color: #ed627e;
      text-shadow: 4px 4px 8px rgba(237, 98, 126, 0.3);
      margin-bottom: 0.5rem;
      line-height: 1;
      position: relative;
      display: inline-block;
    }
    
    .error-code span {
      display: inline-block;
      animation: bounce 2s ease-in-out infinite;
    }
    
    .error-code span:nth-child(1) { animation-delay: 0s; }
    .error-code span:nth-child(2) { animation-delay: 0.2s; }
    .error-code span:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-15px) rotate(-5deg); }
      50% { transform: translateY(0) rotate(0deg); }
      75% { transform: translateY(-10px) rotate(5deg); }
    }
    
    .error-message {
      font-size: 2rem;
      color: #333;
      margin-bottom: 0.8rem;
      font-family: 'Source Han Serif CN', serif;
      font-weight: 600;
    }
    
    .error-submessage {
      font-size: 1.1rem;
      color: #888;
      margin-bottom: 1.5rem;
      font-family: 'Source Han Serif CN', serif;
    }
    
    .error-quote {
      font-size: 1.2rem;
      color: #ed556a;
      margin-bottom: 2.5rem;
      font-family: '楷体', serif;
      padding-left: 1rem;
      border-left: 3px solid #ed627e;
    }
    
    .btn-group {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    
    .home-btn {
      display: inline-block;
      padding: 0.9rem 2.2rem;
      background: linear-gradient(135deg, #ed627e, #ed556a);
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-size: 1rem;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(237, 98, 126, 0.3);
    }
    
    .home-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(237, 98, 126, 0.4);
    }
    
    .secondary-btn {
      display: inline-block;
      padding: 0.9rem 2.2rem;
      background: transparent;
      color: #ed627e;
      text-decoration: none;
      border-radius: 30px;
      font-size: 1rem;
      transition: all 0.3s ease;
      border: 2px solid #ed627e;
    }
    
    .secondary-btn:hover {
      background: #ed627e;
      color: white;
    }
    
    .logo-404 {
      margin-top: 3rem;
    }
    
    .logo-404 img {
      width: 100px;
      height: auto;
    }
    
    .floating-stickers {
      position: fixed;
      right: 5%;
      top: 50%;
      transform: translateY(-50%);
      width: 300px;
      height: 400px;
      pointer-events: none;
    }
    
    .sticker {
      position: absolute;
      animation: floatSticker 6s ease-in-out infinite;
    }
    
    .sticker img {
      width: 80px;
      height: 80px;
      filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.1));
    }
    
    .sticker:nth-child(1) {
      top: 10%;
      right: 20%;
      animation-delay: 0s;
      transform: rotate(-10deg);
    }
    
    .sticker:nth-child(2) {
      top: 30%;
      right: 5%;
      animation-delay: 1s;
      transform: rotate(15deg);
    }
    
    .sticker:nth-child(3) {
      top: 55%;
      right: 25%;
      animation-delay: 2s;
      transform: rotate(-5deg);
    }
    
    .sticker:nth-child(4) {
      top: 75%;
      right: 10%;
      animation-delay: 3s;
      transform: rotate(10deg);
    }
    
    @keyframes floatSticker {
      0%, 100% { transform: translateY(0) rotate(var(--rotation, 0deg)); }
      50% { transform: translateY(-20px) rotate(var(--rotation, 0deg)); }
    }
    
    @media (max-width: 768px) {
      .error-container {
        padding-left: 1.5rem;
        padding-right: 1.5rem;
      }
      
      .error-code {
        font-size: 6rem;
      }
      
      .error-message {
        font-size: 1.5rem;
      }
      
      .floating-stickers {
        display: none;
      }
    }
    
    @media (max-width: 480px) {
      .error-code {
        font-size: 5rem;
      }
      
      .btn-group {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="hover-background"></div>
  <script type="module" src="js/shared.js"></script>
  <script type="module" src="js/mouse.js"></script>
  
  <div class="error-container">
    <div class="error-wrapper">
      <div class="error-code">
        <span>4</span><span>0</span><span>4</span>
      </div>
      <div class="error-message">迷路了吗？</div>
      <div class="error-submessage">这个页面可能已经搬家，或者从未存在过</div>
      <div class="error-quote">花有重开日，人无再少年</div>
      
      <div class="btn-group">
        <a href="/" class="home-btn">返回首页</a>
        <a href="/about.html" class="secondary-btn">关于我</a>
      </div>
      
      <div class="logo-404">
        <a href="/">
          <img src="/images/sansuiz-zimu-26.gif" alt="SANSUIZ">
        </a>
      </div>
    </div>
  </div>
  
  <div class="floating-stickers">
    <div class="sticker" style="--rotation: -10deg;">
      <img src="/images/tu/xi.png" alt="xi">
    </div>
    <div class="sticker" style="--rotation: 15deg;">
      <img src="/images/tu/huanxi.png" alt="huanxi">
    </div>
    <div class="sticker" style="--rotation: -5deg;">
      <img src="/images/tu/meihao.png" alt="meihao">
    </div>
    <div class="sticker" style="--rotation: 10deg;">
      <img src="/images/tu/he.png" alt="he">
    </div>
  </div>
</body>
</html>
