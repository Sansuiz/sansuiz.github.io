        <script>
          // 显示加载状态
          document.getElementById('markdown-content').innerHTML = '<div class="loading-message">加载中...</div>';
          
          // 设置fetch超时
          function fetchWithTimeout(resource, options = {}) {
            const { timeout = 8000 } = options;
            
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), timeout);
            
            const fetchPromise = fetch(resource, {
              ...options,
              signal: controller.signal
            });
            
            return fetchPromise.finally(() => clearTimeout(timeoutId));
          }
          
          // 加载markdown内容
          fetchWithTimeout('intro.md')
            .then(response => {
              if (!response.ok) throw new Error('Network response was not ok');
              return response.text();
            })
            .then(text => {
              document.getElementById('markdown-content').innerHTML = marked.parse(text);
              
              // 单独加载最新笔记，不影响主要内容显示
              try {
                // 使用Promise.race添加超时处理
                Promise.race([
                  new Promise((resolve, reject) => {
                    import('./js/latestNote.js').then(module => {
                      module.fetchLatestNote();
                      resolve();
                    }).catch(err => reject(err));
                  }),
                  new Promise((_, reject) => setTimeout(() => reject(new Error('加载最新笔记超时')), 10000))
                ]).catch(err => {
                  console.error('获取最新笔记失败:', err);
                  // 只在控制台显示错误，不影响用户体验
                });
              } catch (error) {
                console.error('加载笔记模块失败:', error);
              }
            })
            .catch(err => {
              console.error('加载MD文件失败:', err);
              document.getElementById('markdown-content').innerHTML = '<div class="error-message">内容加载失败，请刷新页面重试</div>';
            });
        </script>

  <script>
    // 拖拽功能实现
    document.addEventListener('DOMContentLoaded', function() {
      const stickers = document.querySelectorAll('.sticker');
      
      stickers.forEach(sticker => {
        let isDragging = false;
        let offsetX, offsetY;
        
        // 生成随机位置
        const container = document.querySelector('.sticker-container');
        const containerRect = container.getBoundingClientRect();
        const randomX = Math.random() * (containerRect.width - 100); // 100是贴纸宽度
        const randomY = Math.random() * (containerRect.height - 100); // 100是贴纸高度
        
        sticker.style.left = randomX + 'px';
        sticker.style.top = randomY + 'px';
        
        // 为贴纸添加随机旋转角度
        const randomRotation = (Math.random() - 0.5) * 30; // -15到15度
        sticker.style.transform = `rotate(${randomRotation}deg)`;
        
        sticker.addEventListener('mousedown', function(e) {
          isDragging = true;
          offsetX = e.clientX - sticker.getBoundingClientRect().left;
          offsetY = e.clientY - sticker.getBoundingClientRect().top;
          
          // 为当前拖拽的贴纸设置最高z-index
          let maxZIndex = 0;
          stickers.forEach(s => {
            const zIndex = parseInt(s.style.zIndex) || 1;
            if (zIndex > maxZIndex) {
              maxZIndex = zIndex;
            }
          });
          sticker.style.zIndex = maxZIndex + 1; // 拖拽时置于顶层
          
          e.preventDefault(); // 防止默认行为
        });
        
        document.addEventListener('mousemove', function(e) {
          if (!isDragging) return;
          
          const x = e.clientX - offsetX;
          const y = e.clientY - offsetY;
          
          // 限制在容器内
          const containerRect = container.getBoundingClientRect();
          const stickerRect = sticker.getBoundingClientRect();
          
          const maxX = containerRect.width - stickerRect.width;
          const maxY = containerRect.height - stickerRect.height;
          
          const clampedX = Math.max(0, Math.min(maxX, x - containerRect.left));
          const clampedY = Math.max(0, Math.min(maxY, y - containerRect.top));
          
          sticker.style.left = clampedX + 'px';
          sticker.style.top = clampedY + 'px';
        });
        
        document.addEventListener('mouseup', function() {
          isDragging = false;
        });
      });
    });
  </script>
