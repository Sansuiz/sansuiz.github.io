<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Notes</title>
  <link rel="stylesheet" href="css/notes.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
</head>
<body>
  <div class="hover-background"></div>
  <div class="notebooks-wrapper">
    <div class="notebook-container">
      <div class="notebook" data-tag="生活" data-cover="" style="background: linear-gradient(135deg, #e74c3c 0%, #c0392b 50%, #e74c3c 100%);">
        <div class="notebook-top">
          <div class="notebook-title">/ 生活</div>
          <div class="notebook-count">0</div>
        </div>
        <div class="notebook-body"></div>
      </div>
    </div>
    <div class="notebook-container">
      <div class="notebook" data-tag="工作" data-cover="" style="background: linear-gradient(135deg, #3498db 0%, #2980b9 50%, #3498db 100%);">
        <div class="notebook-top">
          <div class="notebook-title">/ 工作</div>
          <div class="notebook-count">0</div>
        </div>
        <div class="notebook-body"></div>
      </div>
    </div>
    <div class="notebook-container">
      <div class="notebook" data-tag="心流" data-cover="" style="background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 50%, #9b59b6 100%);">
        <div class="notebook-top">
          <div class="notebook-title">/ 心流</div>
          <div class="notebook-count">0</div>
        </div>
        <div class="notebook-body"></div>
      </div>
    </div>
  </div>

  <div class="notes-panel">
    <button class="close-btn">
      <i class="fas fa-times"></i>
    </button>
    <div class="notes-content">
      <div class="notes-header">
        <div class="header-left">
          <div class="page-icon">
            <i class="far fa-file-alt"></i>
          </div>
          <div class="page-count">0 Page</div>
        </div>
        <div class="header-right">
          <div class="last-read-label">LastRead</div>
          <div class="last-read-date">-</div>
        </div>
      </div>
      <div class="notes-list">
      </div>
    </div>
  </div>

  <script src="js/notes.js"></script>
</body>
</html>
