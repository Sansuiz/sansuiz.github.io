<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Notes</title>
  <link rel="stylesheet" href="css/notes.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="notebooks-grid" id="notebooksGrid">
  </div>

  <div class="notes-panel" id="notesPanel">
    <button class="close-btn" id="closeBtn">
      <i class="fas fa-times"></i>
    </button>
    <div class="notes-content">
      <div class="notes-header" id="notesHeader">
        <div class="header-left">
          <div class="page-icon">
            <i class="far fa-file-alt"></i>
          </div>
          <div class="page-count" id="pageCount">0 Page</div>
        </div>
        <div class="header-right">
          <div class="last-read-label">LastRead</div>
          <div class="last-read-date" id="lastReadDate">-</div>
        </div>
      </div>
      <div class="notes-list" id="notesList">
      </div>
    </div>
  </div>

  <script src="js/notes.js"></script>
</body>
</html>
