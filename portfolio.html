  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/portfolio.css">
</head>
<body>
  <!-- 导航栏 -->
  <nav>
    <ul>
      <li><a href="index.html">首页</a></li>
      <li><a href="cards.html">卡片</a></li>

  <!-- 作品集容器 -->
  <div class="portfolio-container">
    <h1 class="portfolio-title">我的作品集</h1>
    
    <!-- 书籍网格 -->
    <div class="books-grid">
      <!-- 书籍项将通过 JavaScript 动态生成 -->
    </div>
  </div>

  <!-- 书籍模态框 -->
  <div id="bookModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">作品标题</h2>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </div>
      <div class="book-page-container">
        <!-- 书页将通过 JavaScript 动态生成 -->
        <div class="page-controls">
          <button class="page-btn prev-btn">←</button>
          <button class="page-btn next-btn">→</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 引入 JavaScript -->
  <script src="js/portfolio.js"></script>
